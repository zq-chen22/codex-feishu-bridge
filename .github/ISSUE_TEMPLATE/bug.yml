name: Bug 报告
description: 提交可复现的飞行桥问题
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: 请勿上传凭据、配置文件、数据库、真实聊天截图或未脱敏日志。
  - type: input
    id: version
    attributes:
      label: 版本
      placeholder: v0.3.0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 环境
      placeholder: Ubuntu 24.04 / Python 3.12 / Codex CLI 版本
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 最小复现步骤
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期与实际结果
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: 隐私确认
      options:
        - label: 我已删除凭据、个人信息、组织信息、聊天 ID 和主机路径
          required: true
