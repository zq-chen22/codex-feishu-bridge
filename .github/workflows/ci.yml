name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --require-hashes -r requirements.lock
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: python -m pytest -q
      - run: bandit -q -r src
      - run: pip-audit -r requirements.lock

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip build twine
      - run: python -m build
      - run: twine check dist/*
      - run: python scripts/check-release.py dist

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: python -m pip install detect-secrets
      - name: Scan tracked files
        shell: bash
        run: |
          detect-secrets scan --all-files \
            --exclude-files '(^LICENSE$|(^|/)(\.git|\.venv|\.pytest_cache|\.ruff_cache|build|dist)/|\.(png|jpg|jpeg|gif|webp)$)' \
            | python scripts/check-secrets-scan.py
