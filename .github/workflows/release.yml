name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build twine cyclonedx-bom
      - run: python -m pip install --require-hashes -r requirements.lock
      - run: python -m pip install --no-deps .
      - run: python -m build
      - run: twine check dist/*
      - run: python scripts/check-release.py dist
      - name: Generate SBOM and checksums
        shell: bash
        run: |
          cyclonedx-py environment --output-format JSON --output-file dist/sbom.cdx.json
          cd dist
          sha256sum *.whl *.tar.gz sbom.cdx.json > SHA256SUMS
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes --verify-tag
